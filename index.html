<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>東京ユナイテッドFCプラス 試合一覧</title>

<link rel="stylesheet" href="https://use.typekit.net/wcn1pnu.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/slick.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/style.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/tuplus/css/style.css">

<style>
#main_visual .visual {
  background-image: url(https://tokyo-united-fc.s3.ap-northeast-1.amazonaws.com/image/banner/16912_1477x1108_67c254fb6cad0.jpg);
}

/* 勝敗カラー */
.goal.win { color: blue; font-weight: bold; }
.goal.lose { color: black; font-weight: bold; }
.goal.draw { color: green; font-weight: bold; }

/* 試合テーブル横スクロール */
#result_table {
  display: block;
  overflow-x: auto;
  white-space: nowrap;
}

/* 選手テーブル */
/* スクロール用ラッパー */
.table_wrap {
  overflow-x: auto;
}

/* テーブル */
#player_table {
  width: 100%;
  font-size: 16px !important;
  border-collapse: collapse;
}

/* セル共通 */
#player_table th,
#player_table td {
  border: 1px solid #ccc !important;
  padding: 10px !important;
}

/* 名前（1行固定） */
#player_table th:nth-child(1),
#player_table td:nth-child(1) {
  width: 160px;
  white-space: nowrap;
}

/* 前所属（折り返し） */
#player_table th:last-child,
#player_table td:last-child {
  width: 40%;              /* ←ここを追加（30〜50%で調整OK） */
  white-space: normal;
  word-break: keep-all;    /* ←これが重要（1文字折れ防止） */
}
/* その他の列（普通に表示） */
#player_table td:not(:first-child):not(:last-child),
#player_table th:not(:first-child):not(:last-child) {
  white-space: nowrap;
}/* タブ選択状態 */
.m-submenu a.active {
  background-color: #007bff !important;
  color: white !important;
  padding: 5px 10px;
  border-radius: 5px;
}
#player_table td:not(:last-child),
#player_table th:not(:last-child) {
  text-align: center !important;
}

.season {
  margin-top: 20px;
}
.season button {
  padding: 5px 12px;
  margin-right: 5px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
}
.season button.active {
  background-color: #007bff;
  color: #fff;
}
/* ===== 試合一覧（公式風） ===== */
#result_table {
  margin-top: 20px;
}

.match_row {
  display: flex;
  align-items: center;
  padding: 18px 10px;
  border-bottom: 1px solid #ddd;
}

.match_row:nth-child(even) {
  background: #f5f5f5;
}

/* 節 */
.match_sec {
  width: 50px;
  text-align: center;
  font-weight: bold;
}

/* 日時・会場 */
.match_info {
  width: 45%;
  font-size: 14px;
}

/* HOME / AWAY */
.label {
  display: inline-block;
  padding: 3px 8px;
  font-size: 12px;
  color: #fff;
  border-radius: 3px;
  margin: 0 8px;
}

.label.home {
  background: #c4002f;
}

.label.away {
  background: #777;
}

/* 対戦 */
.match_vs {
  width: 30%;
  font-weight: bold;
}

/* スコア */
.match_score {
  width: 120px;
  text-align: right;
  font-size: 20px;
  font-weight: bold;
}

/* 勝敗マーク */
.match_score.win::before {
  content: "○ ";
  color: #0066cc;
}

.match_score.lose::before {
  content: "● ";
  color: #000;
}

.match_score.draw::before {
  content: "△ ";
  color: green;
}

/* スマホ対応 */
@media (max-width: 768px) {
  .match_row {
    flex-wrap: wrap;
  }

  .match_info {
    width: 100%;
    margin-bottom: 5px;
  }

  .match_vs {
    width: 60%;
  }

  .match_score {
    width: 40%;
  }
}
.match_info {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;              /* ←これ追加（超重要） */
}

/* 日時は固定幅にする */
.match_date {
  width: 170px;
}

/* スタジアムは伸びる */
.match_stadium {
  flex: 1;
}
.match_date {
  width: 180px;
  min-width: 180px;
  white-space: nowrap;
}
@media (max-width: 768px) {

  .match_row {
    flex-wrap: wrap;
    padding: 12px 8px;
  }

  /* 節 */
  .match_sec {
    width: 40px;
    font-size: 13px;
  }

  /* 上段（日時＋会場） */
  .match_info {
    width: calc(100% - 40px);
    flex-wrap: wrap;
    font-size: 13px;
    gap: 4px;
  }

  .match_date {
    width: auto;
    min-width: auto;
  }

  .label {
    font-size: 11px;
    padding: 2px 6px;
  }

  .match_stadium {
    width: 100%;
    white-space: normal;
    font-size: 12px;
  }

  /* 下段（対戦＋スコア） */
  .match_vs {
    width: 70%;
    font-size: 14px;
    margin-top: 6px;
  }

  .match_score {
    width: 30%;
    font-size: 18px;
    text-align: right;
    margin-top: 6px;
  }
}
  .match_date {
    width: auto;
    min-width: auto;
  }

  .label {
    font-size: 11px;
    padding: 2px 6px;
  }

  .match_stadium {
    width: 100%;
    white-space: normal;
    font-size: 12px;
  }

  /* 下段（対戦＋スコア） */
  .match_vs {
    width: 70%;
    font-size: 14px;
    margin-top: 6px;
  }

  .match_score {
    width: 30%;
    font-size: 18px;
    text-align: right;
    margin-top: 6px;
  }
}
</style>
</head>

<body>

<header>
<div class="inner">
<div class="title">
<a href="/">
<h1 class="logo">
<img src="https://tokyo-united-fc.jp/common/img/logo_tufc.svg">
</h1>
<strong>TOKYO UNITED FC</strong>Official Website
</a>
</div>
</div>
</header>

<div id="main_visual">
<div class="visual">
<div class="title">
<div class="ja">東京ユナイテッドFCプラス</div>
<div class="en">TOKYO UNITED FC PLUS</div>
</div>
</div>
</div>

<div class="inner">
<div id="main">

<div class="main_head team">
<div class="lead">
社会人としての成長が「プラスα」の価値をもたらす、という確信をチーム名に込めています。
</div>
</div>

<!-- タブ -->
<div class="m-submenu team">
<ul>
<li><h1><a href="#" id="tab_match" class="active">試合一覧</a></h1></li>
<li><a href="#" id="tab_player">選手・スタッフ</a></li>
<li><a href="#">ニュース</a></li>
</ul>
</div>

<!-- 試合 -->
<section id="match_section">
<h2 id="season_title" class="m-title02">東京都社会人サッカーリーグ2部</h2>

<div id="result_table"></div>
</section>
<div class="season" id="season_tabs">
  <button data-year="2026">2026年</button>
  <button data-year="2025">2025年</button>
  <button data-year="2024">2024年</button>
</div>
<!-- 選手 -->
<section id="player_section" style="display:none;">
<h2 class="m-title02">選手・スタッフ</h2>

<div class="table_wrap">
<table id="player_table">
<thead>
<tr>
<th>名前</th>
<th>ポジション</th>
<th>背番号</th>
<th>生年月日</th>
<th>身長</th>
<th>体重</th>
<th>前所属</th>
</tr>
</thead>
<tbody></tbody>
</table>
</section>

</div>
</div>

<footer>
<div class="copyright">
<div class="inner">
© 2026 東京ユナイテッドFC
</div>
</div>
</footer>

<script src="https://tokyo-united-fc.jp/common/js/jquery-3.6.0.min.js"></script>

<script>
function loadMatches(year) {
  fetch(`matches_${year}.csv?v=` + new Date().getTime())
    .then(res => res.text())
    .then(text => {
      const rows = text.split(/\r?\n/).slice(1);
      const container = document.getElementById("result_table");

      container.innerHTML = "";

      rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(",");
const date = (cols[1] || "").trim();
const time = (cols[2] || "").trim();
const homeaway = (cols[3] || "").trim().toLowerCase();
const stadium = (cols[4] || "").trim();

       const hasScore = cols[6].trim() !== "" && cols[7].trim() !== "";

let scored = null;
let conceded = null;
let result = "";
let cls = "";

if (hasScore) {
  let gf = Number(cols[6]); // CSVの得点
  let ga = Number(cols[7]); // CSVの失点

  // ★ HOME/AWAYで表示を調整
  if (cols[3].trim() === "HOME") {
    scored = gf;
    conceded = ga;
  } else {
    scored = ga;
    conceded = gf;
  }

  // 勝敗判定
  if (scored > conceded) { result = "○"; cls = "win"; }
  else if (scored < conceded) { result = "●"; cls = "lose"; }
  else { result = "△"; cls = "draw"; }
}
let scoreText = "";

if (hasScore) {
  scoreText = `${scored}-${conceded}`;
} else {
  scoreText = "VS";
}
        const div = document.createElement("div");

        div.className = "match_row";

        div.innerHTML = `
          <div class="match_sec">${cols[0]}</div>

<div class="match_info">
  <span class="match_date">${date} ${time}</span>
  <span class="label ${homeaway}">${cols[3].trim()}</span>
  <span class="match_stadium">${stadium}</span>
</div>
          <div class="match_vs">${cols[5]}</div>

          <div class="match_score ${cls}">
            ${scoreText}
          </div>
        `;

        container.appendChild(div);
      });

      document.getElementById("season_title").textContent =
        year + " 東京都社会人サッカーリーグ2部";
    });
}
// ===== 選手CSV =====
fetch("players.csv")
.then(res => res.text())
.then(text => {
  const rows = text.split("\n").slice(1);
  const tbody = document.querySelector("#player_table tbody");

  rows.forEach(row => {
    if (!row.trim()) return;

    const cols = row.split(",");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${cols[0]}</td>
      <td>${cols[1]}</td>
      <td>${cols[2]}</td>
      <td>${cols[3]}</td>
      <td>${cols[4]}</td>
      <td>${cols[5]}</td>
      <td>${cols[6]}</td>
    `;

    tbody.appendChild(tr);
  });
});


// ===== タブ切替 =====
document.getElementById("tab_match").addEventListener("click", function(e){
  e.preventDefault();
  document.getElementById("match_section").style.display = "block";
  document.getElementById("player_section").style.display = "none";
  document.getElementById("season_tabs").style.display = "block"; // ←追加

  this.classList.add("active");
  document.getElementById("tab_player").classList.remove("active");
});

document.getElementById("tab_player").addEventListener("click", function(e){
  e.preventDefault();
  document.getElementById("match_section").style.display = "none";
  document.getElementById("player_section").style.display = "block";
  document.getElementById("season_tabs").style.display = "none"; // ←追加

  this.classList.add("active");
  document.getElementById("tab_match").classList.remove("active");
});
document.querySelectorAll(".season button").forEach(btn => {
  btn.addEventListener("click", function() {
    const year = this.dataset.year;

    loadMatches(year);

    document.querySelectorAll(".season button").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
  });
});

loadMatches("2026");
document.querySelector('.season button[data-year="2026"]').classList.add("active");
</script>

</body>
</html>
