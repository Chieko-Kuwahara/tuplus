<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>東京ユナイテッドFCプラス</title>

<link rel="stylesheet" href="https://use.typekit.net/wcn1pnu.css">

<style>

*{
  box-sizing:border-box;
}

body{
  overflow-x:hidden;
}

#main_visual,
.visual,
.inner,
#main{
  max-width:100%;
  overflow-x:hidden;
}



.match_info,
.match_vs,
.match_score{
  min-width:0;
}
  
#main_visual .visual {
  background-image: url(https://tokyo-united-fc.s3.ap-northeast-1.amazonaws.com/image/banner/16912_1477x1108_67c254fb6cad0.jpg);
  background-size: cover;
  background-repeat: no-repeat;

  /* ★ここが重要 */
  background-position: center center;
  
  height: 280px;
}

/* ===== タブ ===== */
/* ===== タブ ===== */

.m-submenu{
  display:flex;
  gap:10px;
  margin-top:20px;
  margin-bottom:20px;
}

.m-submenu a{
  display:inline-block;
  padding:10px 18px;

  background:#f5f5f5;
  border:1px solid #ccc;
  border-radius:6px;

  color:#222;
  text-decoration:none;
  font-weight:bold;

  transition:.2s;
}

.m-submenu a:hover{
  background:#e9e9e9;
}

.m-submenu a.active{
  background:#007bff;
  color:#fff;
  border-color:#007bff;
}

/* ===== PC試合レイアウト ===== */
.match_row{
  display:flex;
  align-items:center;
  gap:16px;

  padding:12px;
  border-bottom:1px solid #ddd;

  flex-wrap:nowrap;
}

/* 節 */
.match_sec{
  width:40px;
  flex-shrink:0;
}

/* 試合情報 */
.match_info{
  display:flex;
  align-items:center;
  gap:10px;

  width:620px;
  flex-shrink:0;
}

/* 日付 */
.match_date{
  width:170px;
  flex-shrink:0;
}

/* ラベル */
.label{
  flex-shrink:0;
}

/* 会場 */
.match_stadium{
  width:340px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* 対戦相手 */
.match_vs{
  display:flex;
  align-items:center;
  gap:8px;

  flex:0 0 auto;

  font-weight:bold;
}

/* スコア */
.match_score{
  margin-left:auto;
  white-space:nowrap;
  flex-shrink:0;
  font-size:18px;
}
/* ラベル */
.label.home{
  background:#c4002f;
  color:#fff;
  padding:2px 6px;
}

.label.away{
  background:#777;
  color:#fff;
  padding:2px 6px;
}
.match_score.win { color:blue; font-weight:bold; }
.match_score.lose { color:black; font-weight:bold; }
.match_score.draw { color:green; font-weight:bold; }


/* ===== セクション ===== */
section { margin-top:20px; }

/* ===== テーブル ===== */
table{
  width:100%;
  border-collapse:collapse;
}

#player_section table{
  min-width:700px;
}
td,th { border:1px solid #ccc; padding:8px; }
/* ===== 選手テーブル調整 ===== */

#player_section table {
  table-layout: fixed;
}

/* 名前 */
#player_section th:nth-child(1),
#player_section td:nth-child(1){
  width:120px;
  white-space: nowrap;
}

/* ポジション */
#player_section th:nth-child(2),
#player_section td:nth-child(2){
  width:60px;
  text-align:center;
}

/* 背番号 */
#player_section th:nth-child(3),
#player_section td:nth-child(3){
  width:70px;
  text-align:center;
}

/* 生年月日 */
#player_section th:nth-child(4),
#player_section td:nth-child(4){
  width:120px;
  text-align:center;
}

/* 身長・体重 */
#player_section th:nth-child(5),
#player_section td:nth-child(5),
#player_section th:nth-child(6),
#player_section td:nth-child(6){
  width:70px;
  text-align:center;
}

/* 前所属 */
#player_section th:nth-child(7),
#player_section td:nth-child(7){
  width:auto;
  white-space: normal;
}
/* ===== 非表示制御 ===== */
.hidden { display:none; }

.season button.active {
  background:#007bff;
  color:#fff;
}
.table_wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling: touch;
}
  /* ===== スマホ用 選手テーブル ===== */
@media (max-width: 768px){

  #player_section table {
    table-layout: auto;
    min-width: 900px;
  }

  #player_section th,
  #player_section td{
    white-space: nowrap;
  }

}


/* エンブレム画像 */
.team-emblem {
  width: 24px;
  height: 24px;
  object-fit: contain;
  flex-shrink: 0;
}

/* ===== スマホ用：対戦相手を2行目に表示 ===== */
@media (max-width:768px){

  .match_row{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-start;
    gap:6px 0;
  }

  /* 節 */
  .match_sec{
    flex:0 0 32px;
  }

  /* 日付 */
  .match_date{
    flex:0 0 90px;
    font-size:14px;
  }

  /* 1行目 */
  /* HOME/AWAY */
.label{
  flex-shrink:0;
  margin-left:8px;
}

/* 会場 */
.match_stadium{
  flex:1;
  min-width:0;
  font-size:14px;
}


  /* 2行目：エンブレム＋対戦相手 */
  .match_vs{
    display:flex;
    align-items:center;
    gap:6px;

    flex:1 1 auto;
    margin-left:122px;

    font-size:14px;
    min-width:0;
  }

  /* スコア */
  .match_score{
    margin-left:auto;
    font-size:16px;
    white-space:nowrap;
  }

  /* エンブレム */
  .match_vs img{
    width:20px;
    height:20px;
    flex-shrink:0;
  }
}
</style>
</head>

<body>

<!-- ヘッダー画像 -->
<div id="main_visual">
  <div class="visual"></div>
</div>

<!-- タブ -->
<div class="m-submenu">
  <a href="#" id="tab_match" class="active">試合</a>
  <a href="#" id="tab_player">選手</a>
  <a href="#" id="tab_news">ニュース</a>
</div>

<!-- 試合 -->
<!-- 試合 -->
<section id="match_section">

  <div class="season">
    <button data-year="2026">2026</button>
    <button data-year="2025">2025</button>
    <button data-year="2024">2024</button>
  </div>

  <h2 id="season_title"></h2>

  <div id="result_table"></div>

</section>



<!-- 選手 -->
<section id="player_section" class="hidden">
  <div class="table_wrap">
  <table>
    <thead>
      <tr>
        <th>名前</th><th>POS</th><th>背番号</th><th>生年月日</th><th>身長</th><th>体重</th><th>前所属</th>
      </tr>
    </thead>
    <tbody id="player_body"></tbody>
  </table>
    </div>
</section>

<!-- ニュース -->
<section id="news_section" class="hidden">
  <div id="news_list"></div>
</section>

<script>
const leagueMap = {
  "2026":"東京都社会人サッカーリーグ2部",
  "2025":"東京都社会人サッカーリーグ1部",
  "2024":"東京都社会人サッカーリーグ1部"
};

/* =========================
   試合読み込み
========================= */
function loadMatches(year){
  fetch(`matches_${year}.csv?v=` + Date.now())
    .then(r => r.text())
    .then(text => {

      const rows = text.split(/\r?\n/).slice(1);
      const container = document.getElementById("result_table");
      container.innerHTML = "";

      document.getElementById("season_title").innerText =
        leagueMap[year] || "";

      rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(",");

        const date = cols[1] || "";
        const time = cols[2] || "";
        const homeaway = (cols[3] || "").trim();
        const stadium = cols[4] || "";
        const vs = cols[5] || "";

        /* ===== エンブレム画像のパス =====
           images/emblems/ の中に
           team-name.png を置く想定
           例:
           images/emblems/tokyo23.png
           images/emblems/nankatsu.png
        */
        const emblemFile = cols[8] || "";   // CSVの9列目に画像ファイル名
        const emblemHtml = emblemFile
          ? `<img src="images/emblems/${emblemFile}"
                  alt="${vs}"
                  class="team-emblem">`
          : "";

        const gf = Number(cols[6] || 0);
        const ga = Number(cols[7] || 0);
        const hasScore = cols[6] !== "" && cols[7] !== "";

        let scored = 0;
        let conceded = 0;
        let result = "";
        let cls = "";
        let scoreText = "";

        if (hasScore) {
          scored = gf;
          conceded = ga;

          if (scored > conceded) {
            result = "○";
            cls = "win";
          } else if (scored < conceded) {
            result = "●";
            cls = "lose";
          } else {
            result = "△";
            cls = "draw";
          }

          scoreText = `${result} ${scored}-${conceded}`;
        } else {
          scoreText = "VS";
        }

        const div = document.createElement("div");
        div.className = "match_row";

        div.innerHTML = `
<div class="match_sec">${cols[0]}</div>

<div class="match_date">${date} ${time}</div>

<div class="label ${homeaway === "HOME" ? "home" : "away"}">
  ${homeaway}
</div>

<div class="match_stadium">${stadium}</div>

<div class="match_vs">
  ${emblemHtml}
  <span>${vs}</span>
</div>

<div class="match_score ${cls}">
  ${scoreText}
</div>
        `;

        container.appendChild(div);
      });

    });
}
/* =========================
   選手
========================= */
function loadPlayers(){
  fetch("players.csv?v="+Date.now())
  .then(r=>r.text())
  .then(text=>{
    const rows=text.split(/\r?\n/).slice(1);
    const body=document.getElementById("player_body");
    body.innerHTML="";

    rows.forEach(r=>{
      if(!r.trim()) return;
      const c=r.split(",");

      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${c[0]}</td>
        <td>${c[1]}</td>
        <td>${c[2]}</td>
        <td>${c[3]}</td>
        <td>${c[4]}</td>
        <td>${c[5]}</td>
        <td>${c[6]}</td>
      `;
      body.appendChild(tr);
    });
  });
}

/* =========================
   ニュース
========================= */
function loadNews(){
  fetch("news.csv?v="+Date.now())
  .then(r=>r.text())
  .then(text=>{
    const rows=text.split(/\r?\n/).slice(1);
    const list=document.getElementById("news_list");
    list.innerHTML="";

    rows.forEach(r=>{
      if(!r.trim()) return;
      const c=r.split(",");

      const div=document.createElement("div");
      div.className="news_item";
      div.innerHTML=`
        <div>${c[0]}</div>
        <div><a href="${c[2]}">${c[1]}</a></div>
      `;
      list.appendChild(div);
    });
  });
}

/* =========================
   タブ制御
========================= */
function show(tab){

  // 非表示
  document.getElementById("match_section").classList.add("hidden");
  document.getElementById("player_section").classList.add("hidden");
  document.getElementById("news_section").classList.add("hidden");

  // active解除
  document.getElementById("tab_match").classList.remove("active");
  document.getElementById("tab_player").classList.remove("active");
  document.getElementById("tab_news").classList.remove("active");

  // 表示＋active
  if(tab==="match"){
    document.getElementById("match_section").classList.remove("hidden");
    document.getElementById("tab_match").classList.add("active");
  }

  if(tab==="player"){
    document.getElementById("player_section").classList.remove("hidden");
    document.getElementById("tab_player").classList.add("active");
  }

  if(tab==="news"){
    document.getElementById("news_section").classList.remove("hidden");
    document.getElementById("tab_news").classList.add("active");
  }
}

/* =========================
   イベント
========================= */
document.getElementById("tab_match").onclick = () => {
  show("match");
  loadMatches("2026");

  document.querySelectorAll(".season button").forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.year === "2026") {
      btn.classList.add("active");
    }
  });
};
document.getElementById("tab_player").onclick=()=>{
  show("player");
  loadPlayers();
};
document.getElementById("tab_news").onclick=()=>{
  show("news");
  loadNews();
};

document.querySelectorAll(".season button").forEach(btn => {
  btn.onclick = () => {
    // すべてのボタンから active を外す
    document.querySelectorAll(".season button").forEach(b => {
      b.classList.remove("active");
    });

    // クリックしたボタンを青くする
    btn.classList.add("active");

    // 該当年度の試合を読み込む
    loadMatches(btn.dataset.year);
  };
});

/* 初期表示 */
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(location.search);
  const tab = params.get("tab");

  if (tab === "news") {
    show("news");
    loadNews();
  } else if (tab === "player") {
    show("player");
    loadPlayers();
  } else {
    show("match");
    loadMatches("2026");
  }
  document.querySelector('.season button[data-year="2026"]').classList.add("active");
});
</script>

</body>
</html>
