<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>東京ユナイテッドFCプラス 試合一覧</title>

<link rel="stylesheet" href="https://use.typekit.net/wcn1pnu.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/slick.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/style.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/tuplus/css/style.css">

<style>
#main_visual .visual {
  background-image: url(https://tokyo-united-fc.s3.ap-northeast-1.amazonaws.com/image/banner/16912_1477x1108_67c254fb6cad0.jpg);
}

.goal.win { color: blue; font-weight: bold; }
.goal.lose { color: black; font-weight: bold; }
.goal.draw { color: green; font-weight: bold; }

#result_table {
 /* テーブルそのものは普通に戻す */
#result_table {
  width: 100%;
  border-collapse: collapse;
}
#result_table td,
#result_table th {
  white-space: nowrap;
}
/* スクロール用ラッパーを追加 */
.result_wrap {
  overflow-x: auto;
}

.table_wrap {
  overflow-x: auto;
}

#player_table {
  width: 100%;
  font-size: 16px !important;
  border-collapse: collapse;
}

#player_table th,
#player_table td {
  border: 1px solid #ccc !important;
  padding: 10px !important;
}

#player_table th:nth-child(1),
#player_table td:nth-child(1) {
  width: 160px;
  white-space: nowrap;
}

#player_table th:last-child,
#player_table td:last-child {
  width: 40%;
  white-space: normal;
  word-break: keep-all;
}

#player_table td:not(:first-child):not(:last-child),
#player_table th:not(:first-child):not(:last-child) {
  white-space: nowrap;
}

.m-submenu a.active {
  background-color: #007bff !important;
  color: white !important;
  padding: 5px 10px;
  border-radius: 5px;
}

#player_table td:not(:last-child),
#player_table th:not(:last-child) {
  text-align: center !important;
}

.season {
  margin-top: 20px;
}
.season button {
  padding: 5px 12px;
  margin-right: 5px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
}
.season button.active {
  background-color: #007bff;
  color: #fff;
}/* =========================
   試合テーブル（公式風）
========================= */

/* 外枠 */
.result_wrap {
  overflow-x: auto;
}

/* テーブル */
#result_table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

/* ヘッダー */
#result_table th {
  text-align: left;
  padding: 12px 10px;
  border-bottom: 2px solid #ddd;
  font-weight: bold;
}

/* セル */
#result_table td {
  padding: 14px 10px;
  border-bottom: 1px solid #eee;
  vertical-align: middle;
}

/* 列ごとの幅 */
#result_table .sec {
  width: 60px;
  text-align: center;
}

#result_table .info {
  width: 45%;
}

#result_table .score {
  width: 35%;
}

/* 日付・会場の整形 */
.info .date {
  display: inline-block;
  margin-right: 10px;
}

.info .stadium {
  margin-left: 10px;
  color: #555;
}

/* HOME / AWAY */
.m-label01 {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 3px;
}

.m-label01.home {
  background: #007bff;
  color: #fff;
}

.m-label01.away {
  background: #999;
  color: #fff;
}

/* チーム名 */
.score .team {
  margin-right: 10px;
}

/* スコア */
.goal {
  font-weight: bold;
}

/* 勝敗 */
.goal.win { color: #007bff; }
.goal.lose { color: #000; }
.goal.draw { color: green; }

/* =========================
   スマホ対応（公式っぽく）
========================= */

@media (max-width: 768px) {

  #result_table th,
  #result_table td {
    white-space: normal;
  }

  /* 縦並びにする */
  .info span {
    display: block;
  }

  .score span {
    display: block;
  }

  /* 余白調整 */
  #result_table td {
    padding: 10px 6px;
    font-size: 14px;
  }

  /* 節を小さく */
  #result_table .sec {
    width: 40px;
    font-size: 12px;
  }
}
</style>
</head>

<body>

<header>
<div class="inner">
<div class="title">
<a href="/">
<h1 class="logo">
<img src="https://tokyo-united-fc.jp/common/img/logo_tufc.svg">
</h1>
<strong>TOKYO UNITED FC</strong>Official Website
</a>
</div>
</div>
</header>

<div id="main_visual">
<div class="visual">
<div class="title">
<div class="ja">東京ユナイテッドFCプラス</div>
<div class="en">TOKYO UNITED FC PLUS</div>
</div>
</div>
</div>

<div class="inner">
<div id="main">

<div class="main_head team">
<div class="lead">
社会人としての成長が「プラスα」の価値をもたらす、という確信をチーム名に込めています。
</div>
</div>

<div class="m-submenu team">
<ul>
<li><h1><a href="#" id="tab_match" class="active">試合一覧</a></h1></li>
<li><a href="#" id="tab_player">選手・スタッフ</a></li>
</ul>
</div>

<!-- 試合 -->
<section id="match_section">
<h2 id="season_title" class="m-title02">2026 東京都社会人サッカーリーグ2部</h2>

<div class="result_wrap"> 
<table id="result_table">
<thead>
<tr>
<th>節</th>
<th>日時・会場</th>
<th>対戦・スコア</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div> 
</section>

<div class="season">
<button data-year="2026" class="active">2026年</button>
<button data-year="2025">2025年</button>
<button data-year="2024">2024年</button>
</div>

<!-- 選手 -->
<section id="player_section" style="display:none;">
<h2 class="m-title02">選手・スタッフ</h2>

<div class="table_wrap">
<table id="player_table">
<thead>
<tr>
<th>名前</th>
<th>ポジション</th>
<th>背番号</th>
<th>生年月日</th>
<th>身長</th>
<th>体重</th>
<th>前所属</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</section>

</div>
</div>

<footer>
<div class="copyright">
<div class="inner">
© 2026 東京ユナイテッドFC
</div>
</div>
</footer>

<script>
function loadMatches(year) {
  fetch(`matches_${year}.csv?v=` + new Date().getTime())
    .then(res => res.text())
    .then(text => {
      const rows = text.split(/\r?\n/).slice(1);
      const tbody = document.querySelector("#result_table tbody");
      tbody.innerHTML = "";

      rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(",");

        const hasScore = cols[6] && cols[7];

        let scoreHTML = "";

        if (hasScore) {
          const scored = Number(cols[6]);
          const conceded = Number(cols[7]);

          let result = "";
          let cls = "";

          if (scored > conceded) { result = "○"; cls = "win"; }
          else if (scored < conceded) { result = "●"; cls = "lose"; }
          else { result = "△"; cls = "draw"; }

          scoreHTML = `<span class="goal ${cls}">${result} ${scored}-${conceded}</span>`;
        } else {
          scoreHTML = `<span class="goal">VS</span>`;
        }

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${cols[0]}</td>
          <td>${cols[1]} ${cols[2]} / ${cols[3]} / ${cols[4]}</td>
          <td>${cols[5]} ${scoreHTML}</td>
        `;

        tbody.appendChild(tr);
      });

      document.getElementById("season_title").textContent =
        year + " 東京都社会人サッカーリーグ";
    });
}

// 選手
fetch("players.csv")
.then(res => res.text())
.then(text => {
  const rows = text.split("\n").slice(1);
  const tbody = document.querySelector("#player_table tbody");

  rows.forEach(row => {
    if (!row.trim()) return;

    const cols = row.split(",");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${cols[0]}</td>
      <td>${cols[1]}</td>
      <td>${cols[2]}</td>
      <td>${cols[3]}</td>
      <td>${cols[4]}</td>
      <td>${cols[5]}</td>
      <td>${cols[6]}</td>
    `;

    tbody.appendChild(tr);
  });
});

// タブ
document.getElementById("tab_match").onclick = () => {
  document.getElementById("match_section").style.display = "block";
  document.getElementById("player_section").style.display = "none";
};

document.getElementById("tab_player").onclick = () => {
  document.getElementById("match_section").style.display = "none";
  document.getElementById("player_section").style.display = "block";
};

// 年切替
document.querySelectorAll(".season button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".season button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadMatches(btn.dataset.year);
  };
});

// 初期表示
loadMatches("2026");
</script>

</body>
</html>
