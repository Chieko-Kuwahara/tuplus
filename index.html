<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>東京ユナイテッドFCプラス 試合一覧</title>

<link rel="stylesheet" href="https://use.typekit.net/wcn1pnu.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/slick.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/style.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/tuplus/css/style.css">

<style>
#main_visual .visual {
  background-image: url(https://tokyo-united-fc.s3.ap-northeast-1.amazonaws.com/image/banner/16912_1477x1108_67c254fb6cad0.jpg);
}

/* 勝敗カラー */
.match_score.win { color: blue; font-weight: bold; }
.match_score.lose { color: black; font-weight: bold; }
.match_score.draw { color: green; font-weight: bold; }

#result_table {
  display: block;
  overflow-x: auto;
  white-space: nowrap;
}

.match_row {
  display: flex;
  align-items: center;
  padding: 18px 10px;
  border-bottom: 1px solid #ddd;
}

.match_sec { width: 50px; text-align: center; font-weight: bold; }

.match_info {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 520px;
}

.match_date {
  width: 180px;
  min-width: 180px;
  white-space: nowrap;
}

.label {
  display: inline-block;
  padding: 3px 8px;
  font-size: 12px;
  color: #fff;
  border-radius: 3px;
}

.label.home { background: #c4002f; }
.label.away { background: #777; }

.match_vs { flex: 1; font-weight: bold; }

.match_score {
  width: 120px;
  text-align: right;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<section id="match_section">
<h2>東京都社会人サッカーリーグ2部</h2>
<div id="result_table"></div>
</section>

<div class="season" id="season_tabs">
  <button data-year="2026">2026年</button>
  <button data-year="2025">2025年</button>
  <button data-year="2024">2024年</button>
</div>

<script>
function loadMatches(year) {
  fetch(`matches_${year}.csv?v=` + new Date().getTime())
    .then(res => res.text())
    .then(text => {

      const rows = text.split(/\r?\n/).slice(1);
      const container = document.getElementById("result_table");
      container.innerHTML = "";

      rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(",");

        const date = cols[1];
        const time = cols[2];
        const homeaway = cols[3];
        const stadium = cols[4];

        const hasScore = cols[6] !== "" && cols[7] !== "";

        let scored = 0;
        let conceded = 0;
        let result = "";
        let cls = "";
        let scoreText = "";

        if (hasScore) {

          const gf = Number(cols[6]);
          const ga = Number(cols[7]);

          if (homeaway === "HOME") {
            scored = gf;
            conceded = ga;
          } else {
            scored = ga;
            conceded = gf;
          }

          if (scored > conceded) {
            result = "○";
            cls = "win";
          } else if (scored < conceded) {
            result = "●";
            cls = "lose";
          } else {
            result = "△";
            cls = "draw";
          }

          scoreText = `${result} ${scored}-${conceded}`;

        } else {
          scoreText = "VS";
        }

        const div = document.createElement("div");
        div.className = "match_row";

        div.innerHTML = `
          <div class="match_sec">${cols[0]}</div>
          <div class="match_info">
            <span class="match_date">${date} ${time}</span>
            <span class="label ${homeaway}">${homeaway}</span>
            <span class="match_stadium">${stadium}</span>
          </div>
          <div class="match_vs">${cols[5]}</div>
          <div class="match_score ${cls}">
            ${scoreText}
          </div>
        `;

        container.appendChild(div);
      });
    });
}

window.addEventListener("DOMContentLoaded", function () {
  loadMatches("2026");
});
</script>

</body>
</html>
