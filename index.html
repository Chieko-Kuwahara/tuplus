<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>東京ユナイテッドFCプラス</title>

<link rel="stylesheet" href="https://use.typekit.net/wcn1pnu.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/slick.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/common/css/style.css">
<link rel="stylesheet" href="https://tokyo-united-fc.jp/tuplus/css/style.css">

<style>
#main_visual .visual {
  background-image: url(https://tokyo-united-fc.s3.ap-northeast-1.amazonaws.com/image/banner/16912_1477x1108_67c254fb6cad0.jpg);
}

/* =====================
   勝敗カラー
===================== */
.match_score.win { color: blue; font-weight: bold; }
.match_score.lose { color: black; font-weight: bold; }
.match_score.draw { color: green; font-weight: bold; }

/* =====================
   レイアウト（PC）
===================== */
#result_table {
  display: block;
}

.match_row {
  display: flex;
  align-items: center;
  padding: 18px 10px;
  border-bottom: 1px solid #ddd;
}

.match_row:nth-child(even) {
  background: #f5f5f5;
}

.match_sec {
  width: 50px;
  text-align: center;
  font-weight: bold;
}

.match_info {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 520px;
}

.match_date {
  width: 180px;
  white-space: nowrap;
}

.label {
  padding: 3px 8px;
  font-size: 12px;
  color: #fff;
  border-radius: 3px;
}

.label.home { background: #c4002f; }
.label.away { background: #777; }

.match_stadium {
  flex: 1;
}

.match_vs {
  flex: 1;
  font-weight: bold;
}

.match_score {
  width: 120px;
  text-align: right;
  font-size: 20px;
  font-weight: bold;
}

/* =====================
   スマホ
===================== */
@media (max-width: 768px) {

.match_row {
  flex-wrap: wrap;
  padding: 12px 8px;
}

.match_sec {
  width: 30px;
}

.match_info {
  width: 100%;
  flex-wrap: wrap;
}

.match_date {
  width: 120px;
}

.match_score {
  width: 100%;
  text-align: right;
  font-size: 18px;
  margin-top: 6px;
}
}

/* =====================
   タブ
===================== */
.m-submenu a.active {
  background: #007bff;
  color: #fff;
  padding: 5px 10px;
  border-radius: 5px;
}

/* 表示制御 */
section { display: none; }
section.active { display: block; }

.season button.active {
  background: #007bff;
  color: #fff;
}
</style>
</head>

<body>

<header>
<div class="inner">
<div class="title">
<a href="/">
<h1 class="logo">
<img src="https://tokyo-united-fc.jp/common/img/logo_tufc.svg">
</h1>
<strong>TOKYO UNITED FC</strong>Official Website
</a>
</div>
</div>
</header>

<div id="main_visual">
<div class="visual">
<div class="title">
<div class="ja">東京ユナイテッドFCプラス</div>
<div class="en">TOKYO UNITED FC PLUS</div>
</div>
</div>
</div>

<!-- タブ -->
<div class="m-submenu team">
<ul>
<li><a href="#" id="tab_match" class="active">試合一覧</a></li>
<li><a href="#" id="tab_player">選手・スタッフ</a></li>
<li><a href="#" id="tab_news">ニュース</a></li>
</ul>
</div>

<!-- 試合 -->
<section id="match_section" class="active">
<h2 id="season_title"></h2>
<div id="result_table"></div>

<div class="season">
  <button data-year="2026">2026</button>
  <button data-year="2025">2025</button>
  <button data-year="2024">2024</button>
</div>
</section>

<!-- 選手 -->
<section id="player_section">
<h2>選手・スタッフ</h2>
<div id="player_table"></div>
</section>

<!-- ニュース -->
<section id="news_section">
<h2>ニュース</h2>
<div id="news_list"></div>
</section>

<script>
/* =====================
   リーグ名
===================== */
const leagueMap = {
  "2026": "東京都社会人サッカーリーグ2部",
  "2025": "東京都社会人サッカーリーグ1部",
  "2024": "東京都社会人サッカーリーグ1部"
};

/* =====================
   試合読み込み
===================== */
function loadMatches(year) {

  document.getElementById("season_title").textContent = leagueMap[year];

  fetch(`matches_${year}.csv?v=` + Date.now())
    .then(res => res.text())
    .then(text => {

      const rows = text.split(/\r?\n/).slice(1);
      const container = document.getElementById("result_table");
      container.innerHTML = "";

      rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(",");

        const date = cols[1] || "";
        const time = cols[2] || "";
        const homeaway = (cols[3] || "").toUpperCase();
        const stadium = cols[4] || "";
        const opponent = cols[5] || "";

        const hasScore = cols[6] !== "" && cols[7] !== "";

        let scored = 0;
        let conceded = 0;
        let result = "";
        let cls = "";

        if (hasScore) {
          const gf = Number(cols[6]);
          const ga = Number(cols[7]);

          if (homeaway === "HOME") {
            scored = gf;
            conceded = ga;
          } else {
            scored = ga;
            conceded = gf;
          }

          if (scored > conceded) { result = "○"; cls = "win"; }
          else if (scored < conceded) { result = "●"; cls = "lose"; }
          else { result = "△"; cls = "draw"; }
        }

        const scoreText = hasScore ? `${result} ${scored}-${conceded}` : "VS";

        const div = document.createElement("div");
        div.className = "match_row";

        div.innerHTML = `
          <div class="match_sec">${cols[0]}</div>
          <div class="match_info">
            <span class="match_date">${date} ${time}</span>
            <span class="label ${homeaway.toLowerCase()}">${homeaway}</span>
            <span class="match_stadium">${stadium}</span>
          </div>
          <div class="match_vs">${opponent}</div>
          <div class="match_score ${cls}">
            ${scoreText}
          </div>
        `;

        container.appendChild(div);
      });
    });
}

/* =====================
   選手
===================== */
function loadPlayers() {
  fetch("players.csv?v=" + Date.now())
    .then(r => r.text())
    .then(t => {
      const rows = t.split(/\r?\n/).slice(1);
      const c = document.getElementById("player_table");
      c.innerHTML = rows.map(r => {
        if (!r) return "";
        const x = r.split(",");
        return `<div>${x[0]} / ${x[1]} / ${x[2]}</div>`;
      }).join("");
    });
}

/* =====================
   ニュース
===================== */
function loadNews() {
  fetch("news.csv?v=" + Date.now())
    .then(r => r.text())
    .then(t => {
      const rows = t.split(/\r?\n/).slice(1);
      const c = document.getElementById("news_list");
      c.innerHTML = rows.map(r => {
        if (!r) return "";
        const x = r.split(",");
        return `<div>${x[0]} ${x[1]}</div>`;
      }).join("");
    });
}

/* =====================
   タブ切替
===================== */
function showTab(tab) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab + "_section").classList.add("active");
}

/* =====================
   イベント
===================== */
document.getElementById("tab_match").onclick = e => {
  e.preventDefault();
  showTab("match");
};

document.getElementById("tab_player").onclick = e => {
  e.preventDefault();
  showTab("player");
  loadPlayers();
};

document.getElementById("tab_news").onclick = e => {
  e.preventDefault();
  showTab("news");
  loadNews();
};

document.querySelectorAll(".season button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".season button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadMatches(btn.dataset.year);
  };
});

/* 初期表示 */
window.addEventListener("DOMContentLoaded", () => {
  loadMatches("2026");
});
</script>

</body>
</html>
