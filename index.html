<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>東京ユナイテッドFCプラス</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 0;
}

/* ===== ヘッダー簡易 ===== */
header {
  padding: 20px;
  background: #111;
  color: #fff;
}

/* ===== タブ ===== */
.m-submenu ul {
  display: flex;
  list-style: none;
  padding: 0;
  margin: 0;
  background: #f5f5f5;
}

.m-submenu li a {
  display: block;
  padding: 12px 18px;
  text-decoration: none;
  color: #333;
}

.m-submenu a.active {
  background: #007bff;
  color: #fff;
}

/* ===== セクション ===== */
section {
  padding: 20px;
}

/* ===== 試合一覧 ===== */
.match_row {
  display: flex;
  padding: 12px;
  border-bottom: 1px solid #ddd;
}

.match_sec {
  width: 50px;
  font-weight: bold;
}

.match_info {
  flex: 1;
  display: flex;
  gap: 10px;
}

.label {
  padding: 2px 8px;
  font-size: 12px;
  color: #fff;
  border-radius: 4px;
}

.label.home { background: #c4002f; }
.label.away { background: #777; }

.match_score {
  width: 120px;
  text-align: right;
  font-weight: bold;
}

.match_score.win { color: blue; }
.match_score.lose { color: black; }
.match_score.draw { color: green; }

/* ===== ボタン（年度） ===== */
.season {
  padding: 10px 20px;
}

.season button {
  margin-right: 5px;
  padding: 6px 12px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
}

.season button.active {
  background: #007bff;
  color: #fff;
}

/* ===== 表 ===== */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

/* ===== ニュース ===== */
.news_item {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
}

.news_date {
  font-size: 12px;
  color: #666;
}

</style>
</head>

<body>

<header>
東京ユナイテッドFCプラス
</header>

<!-- タブ -->
<div class="m-submenu">
<ul>
<li><a href="#" id="tab_match" class="active">試合</a></li>
<li><a href="#" id="tab_player">選手</a></li>
<li><a href="#" id="tab_news">ニュース</a></li>
</ul>
</div>

<!-- 試合 -->
<section id="match_section">
<h2>試合一覧</h2>
<div id="result_table"></div>
</section>

<div class="season" id="season_tabs">
<button data-year="2026" class="active">2026</button>
<button data-year="2025">2025</button>
<button data-year="2024">2024</button>
</div>

<!-- 選手 -->
<section id="player_section" style="display:none;">
<h2>選手</h2>
<table id="player_table">
<tbody></tbody>
</table>
</section>

<!-- ニュース -->
<section id="news_section" style="display:none;">
<h2>ニュース</h2>
<div id="news_list"></div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* =====================
     タブ
  ===================== */
  const tabMatch = document.getElementById("tab_match");
  const tabPlayer = document.getElementById("tab_player");
  const tabNews = document.getElementById("tab_news");

  const matchSec = document.getElementById("match_section");
  const playerSec = document.getElementById("player_section");
  const newsSec = document.getElementById("news_section");

  function show(tab) {
    matchSec.style.display = "none";
    playerSec.style.display = "none";
    newsSec.style.display = "none";

    tabMatch.classList.remove("active");
    tabPlayer.classList.remove("active");
    tabNews.classList.remove("active");

    if (tab === "match") {
      matchSec.style.display = "block";
      tabMatch.classList.add("active");
    }
    if (tab === "player") {
      playerSec.style.display = "block";
      tabPlayer.classList.add("active");
    }
    if (tab === "news") {
      newsSec.style.display = "block";
      tabNews.classList.add("active");
    }
  }

  tabMatch.onclick = e => { e.preventDefault(); show("match"); };
  tabPlayer.onclick = e => { e.preventDefault(); show("player"); };
  tabNews.onclick = e => { e.preventDefault(); show("news"); };

  show("match");


  /* =====================
     試合
  ===================== */
  function loadMatches(year) {
    fetch(`matches_${year}.csv?v=` + Date.now())
      .then(r => r.text())
      .then(text => {

        const rows = text.split(/\r?\n/).slice(1);
        const container = document.getElementById("result_table");
        container.innerHTML = "";

        rows.forEach(row => {
          if (!row.trim()) return;

          const c = row.split(",");

          const date = c[1] || "";
          const time = c[2] || "";

          const raw = (c[3] || "").replace(/\s+/g,"").toUpperCase();
          const isHome = raw.includes("HOME");

          const gf = parseInt(c[6],10);
          const ga = parseInt(c[7],10);
          const has = !isNaN(gf) && !isNaN(ga);

          let s=0,g=0,r="",cls="";

          if (has) {
            if (isHome) { s=gf; g=ga; } else { s=ga; g=gf; }

            if (s>g){r="○";cls="win";}
            else if (s<g){r="●";cls="lose";}
            else {r="△";cls="draw";}
          }

          const score = has ? `${r} ${s}-${g}` : "VS";

          const div = document.createElement("div");
          div.className="match_row";

          div.innerHTML=`
            <div class="match_sec">${c[0]}</div>
            <div class="match_info">
              <span>${date} ${time}</span>
              <span class="label ${isHome?'home':'away'}">${c[3]}</span>
              <span>${c[4]}</span>
            </div>
            <div>${c[5]}</div>
            <div class="match_score ${cls}">${score}</div>
          `;

          container.appendChild(div);
        });
      });
  }


  /* =====================
     選手（仮CSV）
  ===================== */
  function loadPlayers() {
    fetch("players.csv")
      .then(r => r.text())
      .then(t => {
        const rows=t.split(/\r?\n/).slice(1);
        const tb=document.querySelector("#player_table tbody");
        tb.innerHTML="";
        rows.forEach(r=>{
          if(!r.trim())return;
          const c=r.split(",");
          const tr=document.createElement("tr");
          tr.innerHTML=`<td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td>`;
          tb.appendChild(tr);
        });
      });
  }


  /* =====================
     ニュース
  ===================== */
  function loadNews() {
    fetch("news.csv")
      .then(r=>r.text())
      .then(t=>{
        const rows=t.split(/\r?\n/).slice(1);
        const box=document.getElementById("news_list");
        box.innerHTML="";
        rows.forEach(r=>{
          if(!r.trim())return;
          const c=r.split(",");
          const div=document.createElement("div");
          div.className="news_item";
          div.innerHTML=`<div class="news_date">${c[0]}</div><div>${c[1]}</div>`;
          box.appendChild(div);
        });
      });
  }


  /* =====================
     年度切替
  ===================== */
  document.querySelectorAll("#season_tabs button").forEach(btn=>{
    btn.onclick=function(){
      document.querySelectorAll("#season_tabs button")
        .forEach(b=>b.classList.remove("active"));
      this.classList.add("active");
      loadMatches(this.dataset.year);
    };
  });


  /* 初期 */
  loadMatches("2026");
  loadPlayers();
  loadNews();

});
</script>

</body>
</html>
